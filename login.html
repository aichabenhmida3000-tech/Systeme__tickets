<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1 class="login-title">Système de tickets</h1>
            <p class="login-subtitle">Connectez-vous</p>
            <form id="login-form">
                <div class="form-group"><input type="text" id="username" required placeholder="Nom d'utilisateur"></div>
                <div class="form-group"><input type="password" id="password" required placeholder="Mot de passe"></div>
                <div id="login-error" style="display:none;color:#d32f2f;margin-bottom:1rem"></div>
                <button type="submit" class="btn btn-primary btn-full">Se connecter</button>
            </form>
            <div class="signup-link"><span>Pas de compte? </span><a href="signup.html">S'inscrire</a></div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>if(user) location.href='tab-de-bord.html';</script>
</body>
</html>
