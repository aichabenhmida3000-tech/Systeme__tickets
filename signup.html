<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1 class="login-title">Système de tickets</h1>
            <p class="login-subtitle">Créer un compte</p>
            <form id="signup-form">
                <div class="form-group"><input type="text" name="username" required placeholder="Nom d'utilisateur"></div>
                <div class="form-group"><input type="email" name="email" required placeholder="Email"></div>
                <div class="form-group"><input type="password" id="password" name="password" required placeholder="Mot de passe"></div>
                <div class="form-group"><input type="password" id="confirm_password" required placeholder="Confirmer"></div>
                <div class="form-group">
                    <select name="role" required>
                        <option value="">Rôle</option>
                        <option value="user">Utilisateur</option>
                        <option value="support">Support</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-full">S'inscrire</button>
            </form>
            <div class="signup-link"><a href="login.html">Se connecter</a></div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>if(user) location.href='tab-de-bord.html';</script>
</body>
</html>
