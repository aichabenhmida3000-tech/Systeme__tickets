<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tableau de bord</title>
<link rel="stylesheet" href="style.css">
</head>
<body style="display:none">
    <nav class="navbar">
        <a href="tab-de-bord.html" class="navbar-brand">Système de tickets</a>
        <div class="navbar-menu">
            <a href="tab-de-bord.html" class="active">Tableau de bord</a>
            <a href="nv-ticket.html">Nouveau ticket</a>
            <a href="faq.html">FAQ</a>
            <a href="administration.html" class="admin-only" style="display:none">Administration</a>
            <a href="stats.html" class="admin-only" style="display:none">Statistiques</a>
        </div>
        <div class="user-menu">
            <button class="btn-logout" onclick="logout()">Déconnexion</button>
        </div>
    </nav>
    <div class="container">
        <div class="main-content">
            <div class="d-flex justify-between align-center mb-3">
                <h1 class="card-title">Mes tickets</h1>
                <a href="nv-ticket.html" class="btn btn-primary">+ Nouveau ticket</a>
            </div>
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Titre</th>
                            <th>Statut</th>
                            <th>Priorité</th>
                            <th>Date</th>
                            <th>Catégorie</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tickets-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <div id="support-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center">
        <div style="background:white;width:90%;max-width:500px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.2);">
            <div style="padding:1.5rem;border-bottom:1px solid #e5e7eb;">
                <h2 style="margin:0;color:#3769A6;">Détails du ticket</h2>
            </div>
            <div style="padding:2rem;">
                <div style="margin-bottom:1rem;padding:1rem;background:#f9fafb;border-radius:8px;">
                    <h3 id="support-modal-title" style="margin-bottom:0.5rem;color:#1a1a1a;"></h3>
                    <p id="support-modal-desc" style="color:#6b7280;margin-bottom:1rem;"></p>
                    <div style="display:flex;gap:0.5rem;">
                        <span id="support-modal-status"></span>
                        <span id="support-modal-priority"></span>
                    </div>
                </div>
                <div style="display:flex;gap:1rem;">
                    <button id="support-resolve-btn" class="btn btn-primary" style="flex:1;">Marquer comme résolu</button>
                    <button id="support-close-btn" onclick="closeSupportModal()" class="btn btn-secondary" style="flex:1;">Fermer</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>checkAuth();</script>
</body>
</html>
