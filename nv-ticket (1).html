<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouveau Ticket</title>
<link rel="stylesheet" href="style.css">
</head>
<body style="display:none">
    <nav class="navbar">
        <a href="dashboard.html" class="navbar-brand">Système de tickets</a>
        <div class="navbar-menu">
            <a href="dashboard.html">Tableau de bord</a>
            <a href="nv-ticket.html" class="active">Nouveau ticket</a>
            <a href="faq.html">FAQ</a>
            <a href="administration.html" class="admin-only" style="display:none">Administration</a>
            <a href="stats.html" class="admin-only" style="display:none">Statistiques</a>
        </div>
        <div class="user-menu">
            <button class="btn-logout" onclick="logout()">Déconnexion</button>
        </div>
    </nav>
    <div class="container" style="display:flex;justify-content:center;align-items:flex-start;min-height:calc(100vh - 80px)">
        <div class="card" style="width:100%;max-width:600px;margin-top:2rem">
            <div class="card-header" style="border-bottom:1px solid var(--border-color)">
                <h1 class="card-title">Créer un ticket</h1>
            </div>
            <form id="ticket-form" style="padding:2rem">
                <div class="form-group">
                    <label>Titre</label>
                    <input type="text" name="title" required placeholder="Décrivez le problème">
                </div>
                <div class="form-group">
                    <label>Catégorie</label>
                    <select name="category">
                        <option value="reseaux">Réseaux</option>
                        <option value="authentification">Authentification</option>
                        <option value="serveur">Serveur</option>
                        <option value="base-donnees">Base de données</option>
                        <option value="upload-download">Upload-Download</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Priorité</label>
                    <select name="priority">
                        <option value="moyenne">Moyenne</option>
                        <option value="haute">Haute</option>
                        <option value="urgente">Urgente</option>
                        <option value="ok">OK</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" required placeholder="Décrivez en détail..." style="min-height:120px"></textarea>
                </div>
                <div style="display:flex;gap:1rem;margin-top:2rem">
                    <button type="submit" class="btn btn-primary">Créer</button>
                    <a href="dashboard.html" class="btn btn-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
    <script>checkAuth(['admin','support','user']);</script>
</body>
</html>
